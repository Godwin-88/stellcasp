services:
  neo4j:
    image: neo4j:5.26
    container_name: zkkyc-neo4j-dev
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "${NEO4J_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./migrations/neo4j:/migrations/neo4j:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: zkkyc-postgres-dev
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-zkkyc}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-zkkyc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zkkyc"]
      interval: 10s
      timeout: 5s
      retries: 5

  x402-facilitator:
    image: make-software/casper-x402:latest
    container_name: zkkyc-x402-dev
    ports:
      - "3000:3000"
    environment:
      - CASPER_NODE_URL=https://rpc.testnet.cspr.network
      - FACILITATOR_PRICE=0.001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles:
      - toolkit

  casper-mcp:
    build:
      context: ./zkkyc/toolkit
      dockerfile: Dockerfile.mcp
    container_name: zkkyc-mcp-dev
    ports:
      - "3001:3001"
    environment:
      - CASPER_NODE_URL=https://rpc.testnet.cspr.network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles:
      - toolkit

  neo4j-migrations:
    image: python:3.11-slim
    container_name: zkkyc-neo4j-migrations
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - .:/app:ro
    working_dir: /app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    command: >
      sh -c "
        pip install --no-cache-dir neo4j &&
        python scripts/run_neo4j_migrations.py
      "
    restart: "no"

  migrations:
    image: python:3.11-slim
    container_name: zkkyc-migrations
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - .:/app:ro
    working_dir: /app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-zkkyc}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-zkkyc}
    command: >
      sh -c "
        pip install --no-cache-dir neo4j asyncpg &&
        echo 'Running PostgreSQL migrations...' &&
        psql postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB} -f /app/migrations/001_initial_schema.sql || true &&
        echo 'Running Neo4j migrations...' &&
        python scripts/run_neo4j_migrations.py &&
        echo 'All migrations completed successfully'
      "
    restart: "no"
    profiles:
      - migrations

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data: